<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa | Digital Universe 🌸</title>
    <style>
        /* GENEL SAYFA TASARIMI */
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #fff5f8, #fce4ec); 
            color: #5d4037; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ✨ SÜZÜLEN YILDIZLAR EFEKTİ */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }
        .star {
            position: absolute; background-color: #f8bbd0; border-radius: 50%;
            opacity: 0.6; animation: drift linear infinite;
        }
        /* Yıldızların farklı hızlarda süzülmesi */
        .star:nth-child(1) { width: 4px; height: 4px; left: 10%; animation-duration: 10s; }
        .star:nth-child(2) { width: 6px; height: 6px; left: 30%; animation-duration: 15s; }
        .star:nth-child(3) { width: 3px; height: 3px; left: 50%; animation-duration: 12s; }
        .star:nth-child(4) { width: 5px; height: 5px; left: 70%; animation-duration: 18s; }
        .star:nth-child(5) { width: 4px; height: 4px; left: 85%; animation-duration: 14s; }
        .star:nth-child(6) { width: 7px; height: 7px; left: 20%; animation-duration: 20s; }
        .star:nth-child(7) { width: 3px; height: 3px; left: 60%; animation-duration: 11s; }

        @keyframes drift {
            0% { transform: translateY(-50px); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* İÇERİK KUTUSU */
        .content { 
            position: relative; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
        }
        
        .profile-container { margin-top: 60px; text-align: center; }

        .profile-pic {
            width: 115px; height: 115px;
            border-radius: 50%;
            border: 4px solid #f8bbd0; 
            box-shadow: 0 10px 25px rgba(248, 187, 208, 0.4);
            margin: 0 auto;
            background-image: url('profile.jpg'); /* Resmin yüklü olduğundan emin ol */
            background-size: cover;
            background-position: center;
        }
        
        h1 { margin: 25px 0 5px; font-size: 28px; font-weight: 700; color: #880e4f; }
        .tagline { margin-bottom: 45px; color: #ad1457; font-size: 13px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        
        .links-container { width: 90%; max-width: 420px; }
