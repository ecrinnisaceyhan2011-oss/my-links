<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisas Place | Projects</title>
    <style>
        /* Soft Pembe & Estetik Arka Plan */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f8 0%, #fce4ec 50%, #f8bbd0 100%);
            font-family: 'Poppins', sans-serif;
            color: #880e4f;
        }

        /* Ana Konteyner (Cam Efekti) */
        .hub-container {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 50px;
            box-shadow: 0 20px 50px rgba(252, 228, 236, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.7);
            width: 350px;
            text-align: center;
        }

        /* Senin eklediğin profile.jpg buraya gelecek */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            object-fit: cover; /* Fotoğrafın yamulmasını engeller */
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: -1px;
            font-weight: 700;
            color: #701344;
        }

        p {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* Link Butonları */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-link {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.8);
            color: #ad1457;
            padding: 16px;
            border-radius: 22px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid white;
        }

        /* Hover Efekti */
        .project-link:hover {
            transform: scale(1.03);
            background: #f06292;
            color: white;
            box-shadow: 0 10px 25px rgba(240, 98, 146, 0.35);
        }

        .icon { font-size: 18px; }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            opacity: 0.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="hub-container">
    <img src="profile.jpg" class="profile-img" alt="Nisa's Profile">
    
    <h1>Nisas place</h1>
    <p>explore my digital universe ✨</p>

    <div class="links-wrapper">
        <a href="moods-diary.html" class="project-link">
            <span class="icon">📖</span> moods-diary
        </a>
        
        <a href="ariana-quiz.html" class="project-link">
            <span class="icon">🎙️</span> ariana-quiz
        </a>

        <a href="my-runner-game.html" class="project-link">
            <span class="icon">🏃</span> my-runner-game
        </a>

        <a href="motor-rcy.html" class="project-link">
            <span class="icon">🏍️</span> motor-rcy
        </a>

        <a href="culture-quiz.html" class="project-link">
            <span class="icon">🌍</span> culture-quiz
        </a>
    </div>

    <div class="footer">
        made with love 🎀
    </div>
</div>

</body>
</html>
