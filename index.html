<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Universe | Projects</title>
    <style>
        /* Soft Pembe & Estetik Arka Plan */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f8 0%, #fce4ec 50%, #f8bbd0 100%);
            font-family: 'Poppins', sans-serif;
            color: #880e4f;
        }

        /* Ana Konteyner (Cam Efekti) */
        .hub-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 50px;
            box-shadow: 0 20px 50px rgba(252, 228, 236, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            width: 360px;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        p {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* Link Butonları */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .project-link {
            text-decoration: none;
            background: white;
            color: #ad1457;
            padding: 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(252, 228, 236, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        /* Üstüne gelince efektler */
        .project-link:hover {
            transform: translateY(-5px) scale(1.02);
            background: #f06292;
            color: white;
            box-shadow: 0 10px 20px rgba(240, 98, 146, 0.3);
        }

        /* İkonlar için küçük stil */
        .icon { font-size: 20px; }

        /* Alt Bilgi */
        .footer {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="hub-container">
    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Creative" class="profile-img" alt="Profile">
    <h1>My Universe</h1>
    <p>Everything I've built, all in one place. ✨</p>

    <div class="links-wrapper">
        <a href="moods-diary.html" class="project-link">
            <span class="icon">📖</span> Moods Diary
        </a>
        
        <a href="ariana-quiz.html" class="project-link">
            <span class="icon">🎙️</span> Ariana Quiz
        </a>

        <a href="my-runner-game.html" class="project-link">
            <span class="icon">🏃</span> My Runner Game
        </a>

        <a href="motor-rcy.html" class="project-link">
            <span class="icon">🏍️</span> Motor RCY
        </a>

        <a href="culture-quiz.html" class="project-link">
            <span class="icon">🌍</span> Culture Quiz
        </a>
    </div>

    <div class="footer">
        Made with 💖 by Me
    </div>
</div>

</body>
</html>
