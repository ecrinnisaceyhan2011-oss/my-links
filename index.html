<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa's Universe 🌸</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #fff5f8; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            text-align: center; background: white; padding: 40px;
            border-radius: 40px; box-shadow: 0 15px 35px rgba(248, 187, 208, 0.4);
            width: 320px; border: 2px solid #fce4ec;
        }
        .profile-img {
            width: 100px; height: 100px; border-radius: 50%;
            border: 4px solid #f8bbd0; margin-bottom: 15px;
        }
        h1 { color: #ad1457; font-size: 24px; margin-bottom: 5px; }
        p { color: #880e4f; font-size: 14px; margin-bottom: 25px; font-weight: 500; }

        .link-btn {
            display: block; text-decoration: none;
            background: #f8bbd0; color: #880e4f;
            padding: 15px; margin: 12px 0; border-radius: 20px;
            font-weight: bold; transition: 0.3s;
            border: 2px solid transparent;
        }
        .link-btn:hover {
            background: white; border-color: #f8bbd0;
            transform: scale(1.05); box-shadow: 0 5px 15px rgba(248, 187, 208, 0.3);
        }

        /* Özel İkonlu Butonlar */
        .btn-runner { background: #e1f5fe; color: #01579b; }
        .btn-quiz { background: #fff9c4; color: #f57f17; }
        .btn-ariana { background: #f3e5f5; color: #7b1fa2; }

        .footer { margin-top: 25px; font-size: 12px; color: #ce93d8; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Nisa" class="profile-img" alt="Nisa">
    <h1>Nisa's Projects ✨</h1>
    <p>Web Developer & Creative Coder</p>

    <a href="https://ecrinnisaceyhan2011-oss.github.io/my-runner-game/" class="link-btn btn-runner">
        🌌 Atmosphere Runner
    </a>

    <a href="https://ecrinnisaceyhan2011-oss.github.io/ariana-quiz/" class="link-btn btn-ariana">
        🎙️ Ariana's Notes
    </a>

    <a href="https://ecrinnisaceyhan2011-oss.github.io/culture-quiz/" class="link-btn btn-quiz">
        🌍 Culture Quiz
    </a>

    <div class="footer">Made with ❤️ by Nisa</div>
</div>

</body>
</html>
