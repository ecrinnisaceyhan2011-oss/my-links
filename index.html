<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links | Pembe Dünyam</title>
    <style>
        body { 
            background: #ffdef2; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 40px 20px;
        }
        .profile-card {
            background: white; padding: 30px; border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.2);
            text-align: center; max-width: 450px; width: 100%;
            border: 3px solid #ff69b4;
        }
        h1 { color: #ff1a8c; font-size: 28px; }
        .links-container { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .link-card {
            display: flex; align-items: center; background: #fff0f9;
            padding: 15px 20px; border-radius: 20px; text-decoration: none;
            color: #ff1a8c; font-weight: bold; transition: 0.3s;
            border: 2px solid transparent;
        }
        .link-card:hover { transform: translateY(-3px); border-color: #ff69b4; }
        .icon { font-size: 24px; margin-right: 15px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div style="font-size: 50px;">🌸</div>
        <h1>Benim Dünyam</h1>
        <p>Dosyalarım ve Oyunlarım</p>

        <div class="links-container">
            
            <a href="../nightmare-twilight/" class="link-card">
                <div class="icon">🏃‍♀️</div>
                <span>Nightmare Twilight Runner</span>
            </a>

            <a href="../culture-quiz/" class="link-card">
                <div class="icon">🧠</div>
                <span>Culture Quiz (Kültür Testi)</span>
            </a>

            <a href="../mood-diary/" class="link-card">
                <div class="icon">📔</div>
                <span>Mood Diary (Duygu Günlüğü)</span>
            </a>

            <a href="motor-oyunu.html" class="link-card" style="background: #e6fbff; color: #0088cc;">
                <div class="icon">🏍️</div>
                <span>Night Rider Pro (Yeni!)</span>
            </a>

        </div>
    </div>

    <footer style="margin-top: 20px; color: #ff99cc;">✨ Her şey yolunda! ✨</footer>

</body>
</html>
