<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa | Soft Space 🌸</title>
    <style>
        /* 1. Arka Plan: Çok yumuşak, açık pembe/beyaz geçişi */
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #fff5f8, #fce4ec); 
            color: #5d4037; /* Yazılar koyu kahve/füme (pembe ile çok uyumludur) */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        
        .profile-container {
            margin-top: 60px; text-align: center;
        }

        .profile-pic {
            width: 110px; height: 110px;
            border-radius: 50%;
            /* 2. Profil Çerçevesi: Soft Pembe */
            border: 4px solid #f8bbd0; 
            box-shadow: 0 10px 20px rgba(248, 187, 208, 0.3);
            margin: 0 auto;
            background-color: #fff; /* Resim yoksa beyaz */
        }
        
        h1 { margin: 25px 0 5px; font-size: 28px; font-weight: 700; color: #880e4f; }
        .tagline { margin-bottom: 40px; color: #ad1457; font-size: 13px; letter-spacing: 2px; font-weight: 600; }
        
        .links-container { width: 90%; max-width: 420px; }
        
        /* 3. Link Butonları: Soft Pastel Görünüm */
        .link-card {
            background: #ffffff; /* Beyaz butonlar */
            padding: 18px;
            margin-bottom: 20px;
            text-align: center;
            border-radius: 20px; /* Daha yuvarlak, daha yumuşak */
            text-decoration: none;
            color: #880e4f;
            display: block;
            transition: all 0.4s ease;
            border: 1px solid #f8bbd0;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(248, 187, 208, 0.2);
        }

        /* Üzerine gelince (Hover) */
        .link-card:hover {
            background: #f8bbd0; /* Soft pembe dolgu */
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(248, 187, 208, 0.5);
        }

        .footer { margin-top: auto; padding: 25px; font-size: 12px; color: #ad1457; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-pic"></div> 
        <h1>Nisa 🌸</h1>
        <p class="tagline">JUNIOR DEVELOPER | CREATIVE MIND 🥨</p>
    </div>

    <div class="links-container">
        
        <a href="https://ecrinnisaceyhan2011-oss.github.io/my-runner-game/" class="link-card" target="_blank">
            🥨 Simit Runner Oyunumu Oyna!
        </a>

        <a href="https://github.com/ecrinnisaceyhan2011-oss" class="link-card" target="_blank">
            💻 GitHub Profilim
        </a>

        <a href="#" class="link-card" style="opacity: 0.5; cursor: not-allowed;">
            📝 Mood Diary (Yakında)
        </a>

    </div>

    <div class="footer">Soft Pink Edition | Made by Nisa ♡</div>

</body>
</html>
