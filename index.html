<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nisa | My Links 🚀</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5e);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        .profile-pic {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid #ff9800;
            margin-top: 50px;
            background-color: #555; /* Profil foton yoksa gri görünür */
        }
        h1 { margin: 20px 0 5px; font-size: 24px; }
        p { margin-bottom: 30px; color: #ccc; }
        
        .links-container { width: 90%; max-width: 400px; }
        
        .link-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            display: block;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
        }
        .link-card:hover {
            background: #ff9800;
            transform: scale(1.05);
            color: #1e1e2f;
        }
        .footer { margin-top: auto; padding: 20px; font-size: 12px; color: #888; }
    </style>
</head>
